# =============================================================================
# foxBMS POSIX vECU — CI Pipeline
#
# Builds the POSIX vECU, runs smoke test, unit/integration/ASIL tests, and
# validates bidirectional requirement traceability.
#
# ISO 26262 Part 8: Bidirectional traceability must be maintained.
# ASPICE SWE.4/5/6: Test evidence must be reproducible in CI.
# =============================================================================
name: foxBMS POSIX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CAN_IF: vcan1
  BUILD_DIR: src

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and Smoke Test
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Build & Smoke Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-13 g++-13 make \
            python3 python3-pip \
            can-utils iproute2 linux-modules-extra-$(uname -r)
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Initialize foxBMS submodule
        run: |
          git submodule update --init --recursive foxbms-2
          echo "foxBMS submodule initialized at $(cd foxbms-2 && git rev-parse --short HEAD)"

      - name: Apply POSIX patches
        run: |
          if [ -d patches/ ]; then
            for p in patches/*.patch; do
              [ -f "$p" ] && echo "Applying $p..." && \
                (cd foxbms-2 && git apply --check "../$p" 2>/dev/null && \
                 git apply "../$p") || echo "Patch $p already applied or N/A"
            done
          fi

      - name: Build foxBMS POSIX vECU
        run: |
          cd ${{ env.BUILD_DIR }}
          make -j$(nproc)
          echo "Build completed successfully"
          ls -la foxbms-vecu || ls -la foxbms_posix || echo "Binary name check needed"

      - name: Setup vCAN interface
        run: |
          sudo modprobe vcan
          sudo ip link add ${{ env.CAN_IF }} type vcan
          sudo ip link set ${{ env.CAN_IF }} up
          ip link show ${{ env.CAN_IF }}

      - name: Run smoke test
        run: |
          cd ${{ env.BUILD_DIR }}
          python3 test_smoke.py ${{ env.CAN_IF }}

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foxbms-posix-binary
          path: |
            src/foxbms-vecu
            src/foxbms_posix
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 2: Traceability Validation
  # ---------------------------------------------------------------------------
  traceability:
    name: Traceability Check
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run traceability generator
        id: trace
        run: |
          python scripts/trace-gen.py --stats 2>&1 | tee trace-stats.txt
          python scripts/trace-gen.py --check 2>&1 | tee trace-check.txt
        continue-on-error: true

      - name: Post traceability summary
        if: always()
        run: |
          echo "## Traceability Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f docs/aspice-cl2/00-assessment/traceability-matrix-generated.md ]; then
            # Extract summary table (first 15 lines after "## Summary")
            sed -n '/^## Summary$/,/^## /{ /^## Summary$/d; /^## [^S]/q; p; }' \
              docs/aspice-cl2/00-assessment/traceability-matrix-generated.md \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f trace-stats.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat trace-stats.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Report broken links / untested counts
          BROKEN=$(grep -c "Broken links" trace-check.txt 2>/dev/null || echo "0")
          UNTESTED=$(grep -c "Untested" trace-check.txt 2>/dev/null || echo "0")
          if grep -q "CI CHECK FAILED" trace-check.txt 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **WARNING:** Traceability check found issues. Review trace-check.txt artifact." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload traceability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traceability-matrix
          path: |
            docs/aspice-cl2/00-assessment/traceability-matrix-generated.md
            trace-stats.txt
            trace-check.txt
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 3: Full Test Suite
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Test Suite
    runs-on: ubuntu-24.04
    needs: smoke-test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-13 g++-13 make \
            python3 python3-pip python3-venv \
            can-utils iproute2 linux-modules-extra-$(uname -r)
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          pip3 install --user python-can pytest || true

      - name: Initialize foxBMS submodule and apply patches
        run: |
          git submodule update --init --recursive foxbms-2
          if [ -d patches/ ]; then
            for p in patches/*.patch; do
              [ -f "$p" ] && (cd foxbms-2 && git apply --check "../$p" 2>/dev/null && \
                git apply "../$p") || true
            done
          fi

      - name: Build foxBMS POSIX vECU
        run: |
          cd ${{ env.BUILD_DIR }}
          make -j$(nproc)

      - name: Setup vCAN interface
        run: |
          sudo modprobe vcan
          sudo ip link add ${{ env.CAN_IF }} type vcan
          sudo ip link set ${{ env.CAN_IF }} up

      - name: Run smoke tests
        id: smoke
        run: |
          cd ${{ env.BUILD_DIR }}
          python3 test_smoke.py ${{ env.CAN_IF }} 2>&1 | tee ../test-smoke.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        id: integration
        if: always() && steps.smoke.outcome == 'success'
        run: |
          cd ${{ env.BUILD_DIR }}
          python3 -m pytest test_integration.py -v --tb=short \
            --junitxml=../test-integration.xml 2>&1 | tee ../test-integration.txt || true

      - name: Run ASIL fault injection tests
        id: asil
        if: always() && steps.smoke.outcome == 'success'
        run: |
          cd ${{ env.BUILD_DIR }}
          python3 -m pytest test_asil.py -v --tb=short \
            --junitxml=../test-asil.xml 2>&1 | tee ../test-asil.txt || true

      - name: Run SIL probe tests
        id: sil_probes
        if: always() && steps.smoke.outcome == 'success'
        run: |
          cd ${{ env.BUILD_DIR }}
          python3 -m pytest test_sil_probes.py -v --tb=short \
            --junitxml=../test-sil-probes.xml 2>&1 | tee ../test-sil-probes.txt || true

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke | ${{ steps.smoke.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration | ${{ steps.integration.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ASIL | ${{ steps.asil.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SIL Probes | ${{ steps.sil_probes.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-*.txt
            test-*.xml
          retention-days: 30
