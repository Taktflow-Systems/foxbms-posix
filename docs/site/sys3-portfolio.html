<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>foxBMS 2 — HIL Verification Strategy</title>
<style>
:root{--bg:#0f1117;--border:#2a2d3a;--accent:#7c3aed;--dim:#6b7280}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
nav{background:#111827;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;flex-shrink:0}
nav .logo{font-weight:700;color:#fff;font-size:.95rem;padding:10px 16px 10px 0;border-right:1px solid var(--border);white-space:nowrap}
nav .tabs{display:flex;gap:0;overflow-x:auto}
nav .tab{padding:11px 18px;cursor:pointer;color:var(--dim);font-size:.8rem;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
nav .tab:hover{color:#d1d5db;background:rgba(255,255,255,.03)}
nav .tab.active{color:#fff;border-bottom-color:var(--accent)}
nav a.back{color:var(--dim);text-decoration:none;font-size:.8rem;padding:8px 14px;margin-left:auto}
nav a.back:hover{color:#d1d5db}
iframe{flex:1;border:none;width:100%;background:var(--bg)}
</style>
</head>
<body>

<nav>
  <div class="logo">foxBMS 2 HIL Strategy</div>
  <div class="tabs" id="tabs"></div>
  <a class="back" href="index.html">&larr; Docs</a>
</nav>

<iframe id="content"></iframe>

<script>
// Path mapping: local (file:// or localhost) vs deployed (sil.taktflow-systems.com)
var deployed = location.hostname === 'sil.taktflow-systems.com';
var tabs = [
  ['Overview',      '../aspice-cl2/05-SYS.3-system-architecture/views/overview.html',              'sys3-views/overview.html'],
  ['Wiring Diagram','../aspice-cl2/05-SYS.3-system-architecture/views/wiring-diagram.html',        'sys3-views/wiring-diagram.html'],
  ['ECU Pin Mapping','../aspice-cl2/05-SYS.3-system-architecture/views/ecu-pin-mapping.html',      'sys3-views/ecu-pin-mapping.html'],
  ['State Machines','../aspice-cl2/05-SYS.3-system-architecture/views/state-machine.drawio.svg',   'sys3-views/state-machine.drawio.svg'],
  ['TSR Analysis',  '../aspice-cl2/18-safety/views/tsr-analysis.html',                             'safety-views/tsr-analysis.html'],
  ['Gap Register',  '../aspice-cl2/18-safety/views/gap-register.html',                             'safety-views/gap-register.html'],
  ['Test Cases (107)',    '../aspice-cl2/06-SYS.4-system-integration-test/views/test-cases.html',        'sys4-views/test-cases.html'],
  ['Full Matrix (1,262)', '../aspice-cl2/06-SYS.4-system-integration-test/views/test-matrix-full.html', 'sys4-views/test-matrix-full.html']
];

var container = document.getElementById('tabs');
tabs.forEach(function(t, i) {
  var div = document.createElement('div');
  div.className = 'tab' + (i === 0 ? ' active' : '');
  div.textContent = t[0];
  div.dataset.src = deployed ? t[2] : t[1];
  div.addEventListener('click', function() { load(this); });
  container.appendChild(div);
});

function load(tab) {
  document.getElementById('content').src = tab.dataset.src;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');
}

// Load first tab
load(container.querySelector('.tab'));
</script>
</body>
</html>
