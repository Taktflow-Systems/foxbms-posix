<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>foxBMS 2 — Wiring Diagrams</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:'Segoe UI',system-ui,sans-serif;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
nav{background:#010409;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 16px;flex-shrink:0}
nav h1{font-size:.85rem;color:#fff;padding:8px 14px 8px 0;border-right:1px solid #30363d;white-space:nowrap}
.tabs{display:flex;gap:0}
.tab{padding:9px 16px;cursor:pointer;font-size:.78rem;color:#6e7681;font-weight:500;border-bottom:2px solid transparent}
.tab:hover{color:#c9d1d9}
.tab.active{color:#fff;border-color:#8b5cf6}
iframe{flex:1;border:none;width:100%;background:#0d1117}
</style>
</head>
<body>
<nav>
  <h1>Wiring</h1>
  <div class="tabs">
    <div class="tab active" onclick="load('wiring/page1.html',this)">System Overview</div>
    <div class="tab" onclick="load('wiring/page2.html',this)">MCU Details</div>
    <div class="tab" onclick="load('wiring/page3.html',this)">Board-to-Board</div>
  </div>
</nav>
<iframe id="f" src="wiring/page1.html"></iframe>
<script>
function load(src,el){
  document.getElementById('f').src=src;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
